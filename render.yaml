# Render Blueprint (free tier) — https://render.com/docs/blueprint-spec
# Connect this repo in Render Dashboard → New → Blueprint.
#
# $0/month — service sleeps after ~15 min idle; no persistent disk.
# DB and screenshots are ephemeral (lost on redeploy). Scheduled jobs only
# run while the service is awake. See docs/DEPLOY.md for limits and upgrades.

services:
  - type: web
    name: api-saidas-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./saidas.db
      - key: SCREENSHOTS_DIR
        value: ./screenshots
      - key: PLAYWRIGHT_HEADLESS
        value: "true"
      - key: SCHEDULER_TIMEZONE
        value: America/Sao_Paulo
      - key: PENSIONATO_BASE_URL
        value: https://pensionato.unasp.edu.br/
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      # Set in Render Dashboard after Vercel deploy (comma-separated for multiple URLs):
      - key: FRONTEND_ORIGIN
        sync: false
      # Allow Vercel preview deployments (main + branch previews)
      - key: CORS_ORIGIN_REGEX
        value: https://.*\.vercel\.app
      - key: SECRET_KEY
        generateValue: true
      # Valid Fernet key — set manually in Render Dashboard (see docs/DEPLOY.md)
      - key: ENCRYPTION_KEY
        sync: false
